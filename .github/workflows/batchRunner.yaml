name: Cypress Batch Runner

on: [push, pull_request]

jobs:
  batch1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Run Batch 1 tests
        run: npx cypress run --spec 'cypress/e2e/regression/actions.cy.js,cypress/e2e/regression/aliasing.cy.js,cypress/e2e/regression/assertions.cy.js,cypress/e2e/regression/connectors.cy.js,cypress/e2e/regression/cookies.cy.js,cypress/e2e/regression/cypress_api.cy.js,cypress/e2e/regression/files.cy.js,cypress/e2e/regression/location.cy.js'

  batch2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Run Batch 2 tests
        run: npx cypress run --spec 'cypress/e2e/smoke/LoopingObjects.cy.js,cypress/e2e/smoke/MatchingWords.cy.js,cypress/e2e/smoke/ResponseIntercept.cy.js'

  merge-reports:
    runs-on: ubuntu-latest
    needs: [batch1, batch2]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Merge mochawesome JSON reports
        run: npx mochawesome-merge cypress/reports/mocha/*.json > cypress/reports/mocha/merged-report.json

      - name: Generate HTML report
        run: npx marge cypress/reports/mocha/merged-report.json --reportDir cypress/reports/mocha --reportFilename merged-report

      - name: Upload HTML report
        uses: actions/upload-artifact@v3
        with:
          name: mochawesome-report
          path: cypress/reports/mocha/merged-report.html